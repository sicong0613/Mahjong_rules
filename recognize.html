<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>拍照识别（测试）— 麻将计番</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { padding: 18px 14px 60px; max-width: 900px; margin: 0 auto; }
    h1 { font-size: 1.2rem; margin-bottom: 4px; }
    .sub { color: var(--text-muted); font-size: .82rem; margin-bottom: 14px; }
    .bar { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
    .bar button { padding: 5px 12px; border: 1px solid var(--accent); background: transparent;
      color: var(--accent); border-radius: 6px; cursor: pointer; font-size: .82rem; }
    .hint { font-size: .78rem; color: var(--text-muted); margin: 4px 0 8px; }
    .msg { font-size: .85rem; margin: 8px 0; min-height: 1.2em; }
    .msg.err { color: #c0392b; }
    #canvas { max-width: 100%; border: 1px solid var(--border); border-radius: 8px;
      display: block; margin: 8px 0; touch-action: none; cursor: crosshair; }
    #summary { font-size: .9rem; margin: 10px 0; font-family: monospace; word-break: break-all; }
    .rtiles { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .rtile { display: flex; flex-direction: column; align-items: center; }
    .rtile img { width: 34px; height: 45px; object-fit: contain; border-radius: 3px; }
    .rtile img.haku { background: #fff; box-shadow: inset 0 0 0 1px rgba(0,0,0,.18); }
    .rtile .cap { font-size: .68rem; color: var(--text-muted); margin-top: 2px; white-space: nowrap; }
  </style>
</head>
<body>
  <h1>拍照识别（测试页）</h1>
  <p class="sub">选一张手牌照片，识别后按从左到右排序、映射成牌码。此页仅用于验证识别效果，
    尚未接入计番器。识别走 <code>/api/recognize</code> 代理（密钥在 Worker，前端不暴露）。</p>

  <div class="bar">
    <input id="file" type="file" accept="image/*">
    <button id="clearRoi" hidden>清除框选</button>
  </div>
  <p class="hint">识别用的始终是<strong>完整图片</strong>；在下方图上<strong>拖动框选</strong>你的手牌区域，
    只会保留框内的牌（框外散牌被忽略）。可反复重框，即时生效、无需重新上传。</p>

  <div id="msg" class="msg"></div>
  <canvas id="canvas" hidden></canvas>
  <div id="summary"></div>
  <div id="tiles" class="rtiles"></div>

  <script>
    const $ = id => document.getElementById(id);
    const canvas = $('canvas'), ctx = canvas.getContext('2d');
    const MAX_SIDE = 1600;
    const HONOR = { '1z':'E', '2z':'S', '3z':'W', '4z':'N', '5z':'B', '6z':'F', '7z':'Z' };
    const classToCode = c => HONOR[c] || (/^[0-9][mps]$/.test(c) ? c : null);

    let _img = null;      // 已缩放待画的图
    let _preds = [];      // 完整图片的全部识别框（画布坐标系）
    let _roi = null;      // {x0,y0,x1,y1} 画布坐标；null = 不过滤
    let _drag = null;     // 拖动起点

    function status(t, err) { const m = $('msg'); m.textContent = t; m.className = 'msg' + (err ? ' err' : ''); }
    function loadImage(file) {
      return new Promise((res, rej) => { const i = new Image(); i.onload = () => res(i); i.onerror = rej; i.src = URL.createObjectURL(file); });
    }
    const inRoi = p => !_roi || (p.x >= _roi.x0 && p.x <= _roi.x1 && p.y >= _roi.y0 && p.y <= _roi.y1);

    // ── 选图 → 缩放 → 传完整图 → 存全部框 ──
    $('file').addEventListener('change', async e => {
      const file = e.target.files[0]; e.target.value = '';
      if (!file) return;
      _preds = []; _roi = null; $('clearRoi').hidden = true; $('tiles').innerHTML = ''; $('summary').textContent = '';
      status('读取图片…');
      let img;
      try { img = await loadImage(file); } catch { status('无法读取该图片', true); return; }

      const scale = Math.min(1, MAX_SIDE / Math.max(img.width, img.height));
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.hidden = false;
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      _img = new Image(); _img.src = canvas.toDataURL('image/jpeg', 0.85);
      const b64 = _img.src.split(',')[1];
      await new Promise(r => { _img.onload = r; });

      status('识别中…（上传完整图片）');
      try {
        const res = await fetch('/api/recognize', { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: b64 });
        const data = await res.json().catch(() => null);
        if (!res.ok || !data) { status('识别失败：' + (data?.error || ('HTTP ' + res.status)), true); return; }
        _preds = data.predictions || [];
        status(`识别到 ${_preds.length} 个框；拖动框选你的手牌区域以过滤。`);
        redraw();
      } catch (err) { status('网络错误：' + err.message, true); }
    });

    // ── 画布上拖动框选 ROI ──
    function toCanvas(e) {
      const r = canvas.getBoundingClientRect();
      return { x: (e.clientX - r.left) * (canvas.width / r.width), y: (e.clientY - r.top) * (canvas.height / r.height) };
    }
    canvas.addEventListener('pointerdown', e => { if (!_img) return; canvas.setPointerCapture(e.pointerId); _drag = toCanvas(e); _roi = { x0: _drag.x, y0: _drag.y, x1: _drag.x, y1: _drag.y }; });
    canvas.addEventListener('pointermove', e => { if (!_drag) return; const p = toCanvas(e); _roi = { x0: _drag.x, y0: _drag.y, x1: p.x, y1: p.y }; redraw(); });
    canvas.addEventListener('pointerup', e => {
      if (!_drag) return; _drag = null;
      // 规范化，太小视为取消框选
      const x0 = Math.min(_roi.x0, _roi.x1), x1 = Math.max(_roi.x0, _roi.x1);
      const y0 = Math.min(_roi.y0, _roi.y1), y1 = Math.max(_roi.y0, _roi.y1);
      _roi = (x1 - x0 < 10 || y1 - y0 < 10) ? null : { x0, y0, x1, y1 };
      $('clearRoi').hidden = !_roi;
      redraw();
    });
    $('clearRoi').onclick = () => { _roi = null; $('clearRoi').hidden = true; redraw(); };

    // ── 重绘：图 + ROI + 框（框内红、框外淡灰）+ 列表 ──
    function redraw() {
      if (!_img) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(_img, 0, 0, canvas.width, canvas.height);

      if (_roi) { ctx.lineWidth = 2; ctx.strokeStyle = '#1565c0'; ctx.setLineDash([6, 4]); ctx.strokeRect(_roi.x0, _roi.y0, _roi.x1 - _roi.x0, _roi.y1 - _roi.y0); ctx.setLineDash([]); }

      ctx.font = '13px sans-serif'; ctx.textBaseline = 'bottom'; ctx.lineWidth = 2;
      for (const p of _preds) {
        const keep = inRoi(p);
        ctx.strokeStyle = keep ? '#e23b3b' : 'rgba(120,120,120,.45)';
        ctx.strokeRect(p.x - p.width / 2, p.y - p.height / 2, p.width, p.height);
        if (keep) { ctx.fillStyle = '#e23b3b'; ctx.fillText(p.class, p.x - p.width / 2 + 1, p.y - p.height / 2 - 1); }
      }

      const kept = _preds.filter(inRoi).sort((a, b) => a.x - b.x);
      const box = $('tiles'); box.innerHTML = '';
      const codes = [], unmapped = [];
      for (const p of kept) {
        const code = classToCode(p.class);
        if (!code) { unmapped.push(p.class); continue; }
        codes.push(code);
        const d = document.createElement('div'); d.className = 'rtile';
        const im = document.createElement('img'); im.src = `img/tiles/${code}.svg`; im.alt = code;
        if (code === 'B') im.classList.add('haku');
        const cap = document.createElement('div'); cap.className = 'cap';
        cap.textContent = `${code} ${Math.round((p.confidence || 0) * 100)}%`;
        d.append(im, cap); box.appendChild(d);
      }
      $('summary').textContent = `框内 ${codes.length} 张：${codes.join(' ')}` +
        (unmapped.length ? `　（未映射类：${[...new Set(unmapped)].join(', ')}）` : '');
    }
  </script>
</body>
</html>
