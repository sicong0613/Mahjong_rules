<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>上传记录管理 — 麻将番种统计</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { padding: 20px 14px 60px; max-width: 1100px; margin: 0 auto; }
    h1 { font-size: 1.2rem; margin-bottom: 4px; }
    .sub { color: var(--text-muted); font-size: .82rem; margin-bottom: 16px; }
    .bar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 14px; }
    .bar input[type=password], .bar input[type=number] {
      padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px;
      background: var(--surface); color: inherit; font-size: .85rem;
    }
    .bar input[type=password] { flex: 1; min-width: 220px; }
    .bar input[type=number] { width: 90px; }
    .bar button {
      padding: 6px 14px; border: 1px solid var(--accent); background: var(--accent);
      color: #fff; border-radius: 6px; cursor: pointer; font-size: .85rem;
    }
    .bar button.ghost { background: transparent; color: var(--accent); }
    #logged { font-size: .85rem; color: #2e7d32; white-space: nowrap; }
    .summary { font-size: .85rem; margin-bottom: 10px; color: var(--text-muted); }
    .msg { font-size: .85rem; margin: 10px 0; }
    .msg.err { color: #c0392b; }
    .table-wrap { overflow-x: auto; }
    table { border-collapse: collapse; width: 100%; font-size: .8rem; }
    th, td { border: 1px solid var(--border); padding: 6px 8px; text-align: left; vertical-align: top; }
    th { background: var(--surface); position: sticky; top: 0; }
    td.time { white-space: nowrap; }
    td.time .abbr { color: var(--text-muted); }
    td.time .utc { display: block; color: var(--text-muted); font-size: .72rem; }
    td.geo { white-space: nowrap; font-size: .78rem; }
    td.player { white-space: nowrap; font-weight: 600; }
    .fans span { display: inline-block; background: var(--surface); border: 1px solid var(--border);
      border-radius: 4px; padding: 1px 6px; margin: 1px 2px; white-space: nowrap; }
    .tiles { display: flex; flex-wrap: wrap; gap: 1px; align-items: center; min-width: 200px; }
    .tiles img { width: 22px; height: 29px; object-fit: contain; }
    .tiles .win { outline: 2px solid var(--accent); border-radius: 3px; }
    .tiles-gap { display: inline-block; width: 12px; flex: 0 0 12px; }
    .tiles .code { font-size: .72rem; color: var(--text-muted); margin-right: 3px; }
    td.ip { white-space: nowrap; font-family: monospace; font-size: .76rem; }
    td.ip button { display: block; margin-top: 4px; font-size: .7rem; padding: 2px 6px;
      border: 1px solid #c0392b; color: #c0392b; background: transparent; border-radius: 4px; cursor: pointer; }
    td.ip button.one { border-color: var(--text-muted); color: var(--text-muted); }
  </style>
</head>
<body>
  <h1>上传记录管理</h1>
  <p class="sub">每行 = 一副上传的和牌。此页仅供核查误传/刷量，需管理员 token；数据来自 <code>/api/fan-logs</code>，不对外公开。</p>

  <div class="bar">
    <input id="token" type="password" placeholder="ADMIN_TOKEN" autocomplete="off">
    <span id="logged" hidden>🔓 已登录</span>
    <input id="limit" type="number" value="200" min="1" max="1000" title="加载条数">
    <button id="load">加载</button>
    <button id="export" class="ghost" title="导出全部逐副记录（完整记录 JSON）">导出</button>
    <button id="importAppend" class="ghost" title="导入并追加到现有数据">导入（追加）</button>
    <button id="importReplace" class="ghost" title="先清空全部记录再导入">导入（覆盖）</button>
    <input id="importFile" type="file" accept="application/json,.json" hidden>
    <button id="forget" class="ghost" title="清除本机保存的 token 并重新输入">忘记 token</button>
  </div>

  <div id="summary" class="summary"></div>
  <div id="msg" class="msg"></div>

  <div class="table-wrap">
    <table id="tbl" hidden>
      <thead>
        <tr>
          <th>本地时间（含夏令时）</th><th>和牌人</th><th>地点</th><th>番种</th><th>牌型</th><th>IP</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>

  <script>
    const $ = id => document.getElementById(id);
    const tokenEl = $('token'), limitEl = $('limit');
    const TOKEN_COOKIE = 'hc_admin_token';

    // ── Cookie ──
    function setCookie(name, value, days) {
      const exp = new Date(Date.now() + days * 864e5).toUTCString();
      document.cookie = `${name}=${encodeURIComponent(value)}; expires=${exp}; path=/; SameSite=Lax`;
    }
    function getCookie(name) {
      return document.cookie.split('; ').reduce((r, c) => {
        const i = c.indexOf('='); const k = c.slice(0, i);
        return k === name ? decodeURIComponent(c.slice(i + 1)) : r;
      }, '');
    }
    function delCookie(name) {
      document.cookie = `${name}=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/`;
    }

    // 记住 token（本机 cookie，登录一次后免重输，有效期约一年）
    tokenEl.value = getCookie(TOKEN_COOKIE) || '';

    // 输入 token 加载成功后隐藏输入框，显示「已登录」；忘记则重新显示
    function setLoggedIn(v) { tokenEl.hidden = v; $('logged').hidden = !v; }
    function authToken() { return tokenEl.value.trim() || getCookie(TOKEN_COOKIE) || ''; }
    $('forget').onclick = () => {
      delCookie(TOKEN_COOKIE); tokenEl.value = ''; setLoggedIn(false);
      $('rows').innerHTML = ''; $('tbl').hidden = true; $('summary').textContent = '';
      showMsg('已忘记本机 token');
    };

    function fmtParse(s, fallback) { try { return JSON.parse(s); } catch { return fallback; } }

    function timeCell(ts, geo) {
      const td = document.createElement('td');
      td.className = 'time';
      const utc = ts ? `<span class="utc">上传(UTC): ${new Date(ts).toISOString().slice(0, 19).replace('T', ' ')}</span>` : '';
      if (geo && geo.local) {
        td.innerHTML = `${geo.local} <span class="abbr">${geo.tzAbbr || ''}</span>${utc}`;
      } else if (ts) {
        td.innerHTML = `<span class="abbr">无时区</span>${utc}`;
      } else {
        td.textContent = '—';   // 时间留空
      }
      return td;
    }

    function playerCell(player) {
      const td = document.createElement('td');
      td.className = 'player';
      td.textContent = player || '—';
      return td;
    }

    function geoCell(geo) {
      const td = document.createElement('td');
      td.className = 'geo';
      if (!geo || (!geo.country && !geo.city)) { td.textContent = '—'; return td; }
      const parts = [geo.country, geo.region, geo.city].filter(Boolean);
      td.textContent = parts.join(' / ') + (geo.tz ? `\n${geo.tz}` : '');
      td.title = geo.tz || '';
      return td;
    }

    function tilesCell(tiles) {
      const td = document.createElement('td');
      const box = document.createElement('div');
      box.className = 'tiles';
      const addTile = (code, isWin) => {
        const img = document.createElement('img');
        img.src = `img/tiles/${code}.svg`;
        img.alt = code; img.title = code;
        if (isWin) img.className = 'win';
        img.onerror = () => img.replaceWith(Object.assign(document.createElement('span'),
          { className: 'code', textContent: code }));
        box.appendChild(img);
      };
      const addGap = () => box.appendChild(Object.assign(document.createElement('span'), { className: 'tiles-gap' }));

      if (Array.isArray(tiles)) {
        // 旧格式：平铺数组，最后一张为和牌张
        if (tiles.length === 0) box.innerHTML = '<span class="code">（无牌型）</span>';
        else tiles.forEach((code, i) => addTile(code, i === tiles.length - 1));
      } else if (tiles && typeof tiles === 'object') {
        // 新格式：立牌 + 和牌张（高亮）+ 副露（在右边，按组分隔）
        const { concealed = [], win = null, melds = [] } = tiles;
        if (concealed.length === 0 && !win && melds.length === 0) {
          box.innerHTML = '<span class="code">（无牌型）</span>';
        } else {
          concealed.forEach(c => addTile(c, false));
          if (win) addTile(win, true);
          melds.forEach(m => { if (m && m.length) { addGap(); m.forEach(c => addTile(c, false)); } });
        }
      } else {
        box.innerHTML = '<span class="code">（无牌型）</span>';
      }
      td.appendChild(box);
      return td;
    }

    function fansCell(fans) {
      const td = document.createElement('td');
      td.className = 'fans';
      (fans || []).forEach(n => {
        const s = document.createElement('span'); s.textContent = n; td.appendChild(s);
      });
      return td;
    }

    function ipCell(r) {
      const td = document.createElement('td');
      td.className = 'ip';
      td.append(r.ip || 'unknown');
      const btnIp = document.createElement('button');
      btnIp.textContent = '删除此 IP 全部';
      btnIp.onclick = () => deleteIp(r.ip);
      const btnOne = document.createElement('button');
      btnOne.className = 'one';
      btnOne.textContent = '删除该记录';
      btnOne.onclick = () => deleteRecord(r.id);
      td.append(btnIp, btnOne);
      return td;
    }

    async function load() {
      const token = tokenEl.value.trim();
      if (!token) { showMsg('请先填写 ADMIN_TOKEN', true); return; }
      setCookie(TOKEN_COOKIE, token, 365);
      showMsg('加载中…');
      const limit = Math.min(Math.max(parseInt(limitEl.value) || 200, 1), 1000);
      try {
        const [logsRes, statsRes] = await Promise.all([
          fetch(`/api/fan-logs?token=${encodeURIComponent(token)}&limit=${limit}`),
          fetch('/api/fan-stats'),
        ]);
        if (logsRes.status === 401) { showMsg('token 错误或未设置 ADMIN_TOKEN（401）', true); return; }
        if (!logsRes.ok) { showMsg(`加载失败：HTTP ${logsRes.status}`, true); return; }
        const logs = await logsRes.json();
        const stats = statsRes.ok ? await statsRes.json() : null;
        render(logs, stats);
        setLoggedIn(true);   // 加载成功 → 隐藏 token 输入框
        showMsg('');
      } catch (e) { showMsg('网络错误：' + e.message, true); }
    }

    function render(logs, stats) {
      const rows = $('rows'); rows.innerHTML = '';
      logs.forEach(r => {
        const tr = document.createElement('tr');
        const geo = fmtParse(r.geo, {});
        tr.appendChild(timeCell(r.ts, geo));
        tr.appendChild(playerCell(r.player));
        tr.appendChild(geoCell(geo));
        tr.appendChild(fansCell(fmtParse(r.fans, [])));
        tr.appendChild(tilesCell(fmtParse(r.tiles, [])));
        tr.appendChild(ipCell(r));
        rows.appendChild(tr);
      });
      $('tbl').hidden = logs.length === 0;
      const n = stats ? stats.total : '?';
      $('summary').textContent = `本次显示 ${logs.length} 条；数据库累计和牌总副数 n = ${n}`;
      if (logs.length === 0) showMsg('暂无记录');
    }

    async function deleteRecord(id) {
      const token = authToken();
      if (id == null || !token) return;
      if (!confirm(`确定删除这一条记录（#${id}）并重算番种计数？此操作不可撤销。`)) return;
      try {
        const res = await fetch(`/api/fan-logs?token=${encodeURIComponent(token)}&id=${encodeURIComponent(id)}`,
          { method: 'DELETE' });
        if (!res.ok) { showMsg(`删除失败：HTTP ${res.status}`, true); return; }
        showMsg(`已删除记录 #${id}`);
        load();
      } catch (e) { showMsg('删除出错：' + e.message, true); }
    }

    async function deleteIp(ip) {
      const token = authToken();
      if (!ip || !token) return;
      if (!confirm(`确定删除 IP ${ip} 的全部上传记录，并重算番种计数？此操作不可撤销。`)) return;
      try {
        const res = await fetch(`/api/fan-logs?token=${encodeURIComponent(token)}&ip=${encodeURIComponent(ip)}`,
          { method: 'DELETE' });
        if (!res.ok) { showMsg(`删除失败：HTTP ${res.status}`, true); return; }
        showMsg(`已删除 ${ip} 的记录`);
        load();
      } catch (e) { showMsg('删除出错：' + e.message, true); }
    }

    function showMsg(text, isErr) {
      const m = $('msg'); m.textContent = text; m.className = 'msg' + (isErr ? ' err' : '');
    }

    function downloadJSON(filename, data) {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob); a.download = filename; a.click();
      URL.revokeObjectURL(a.href);
    }

    // 导出：拉全部记录，输出「副」数组（番型汇总，即导入所需格式）
    async function exportRecords() {
      const token = authToken();
      if (!token) { showMsg('请先输入并加载 token', true); return; }
      showMsg('导出中…');
      try {
        const all = [];
        for (let offset = 0; ; offset += 1000) {
          const res = await fetch(`/api/fan-logs?token=${encodeURIComponent(token)}&limit=1000&offset=${offset}`);
          if (!res.ok) { showMsg(`导出失败：HTTP ${res.status}`, true); return; }
          const batch = await res.json();
          all.push(...batch);
          if (batch.length < 1000) break;
        }
        // 完整记录：时间/和牌人/地点/番种/牌型/IP，可直接编辑后再导入
        const records = all.map(r => ({
          ts: r.ts || null,
          player: r.player || null,
          ip: r.ip || null,
          fans: fmtParse(r.fans, []),
          tiles: fmtParse(r.tiles, null),
          geo: fmtParse(r.geo, null),
        })).filter(r => Array.isArray(r.fans) && r.fans.length);
        downloadJSON(`mahjong-records-${Date.now()}.json`, records);
        showMsg(`已导出 ${records.length} 副`);
      } catch (e) { showMsg('导出出错：' + e.message, true); }
    }

    // 导入：读取「副」数组 JSON，追加写入逐副记录
    async function importRecords(e) {
      const file = e.target.files[0];
      e.target.value = '';           // 允许重复选同一文件
      if (!file) return;
      const token = authToken();
      if (!token) { showMsg('请先输入并加载 token', true); return; }
      let hands;
      try { hands = JSON.parse(await file.text()); }
      catch { showMsg('文件不是合法 JSON', true); return; }
      if (!Array.isArray(hands) || hands.length === 0) {
        showMsg('JSON 应为「副」数组：每副可写 ["平和","断幺"]，或 {fans:[...],ts,player,ip,tiles,geo}', true); return;
      }
      const replace = _importMode === 'replace';
      const ask = replace
        ? `确认【覆盖导入】${hands.length} 副？将先清空全部现有记录再导入，此操作不可撤销。`
        : `确认导入 ${hands.length} 副记录？将追加到现有数据并重算计数。`;
      if (!confirm(ask)) return;
      showMsg('导入中…');
      try {
        const url = `/api/fan-logs/import?token=${encodeURIComponent(token)}${replace ? '&mode=replace' : ''}`;
        const res = await fetch(url, {
          method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(hands),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) { showMsg(`导入失败：${data.error || ('HTTP ' + res.status)}`, true); return; }
        showMsg(`已导入 ${data.imported} 副`);
        load();
      } catch (e2) { showMsg('导入出错：' + e2.message, true); }
    }

    let _importMode = 'append';
    $('load').onclick = load;
    $('export').onclick = exportRecords;
    $('importAppend').onclick = () => { _importMode = 'append'; $('importFile').click(); };
    $('importReplace').onclick = () => { _importMode = 'replace'; $('importFile').click(); };
    $('importFile').addEventListener('change', importRecords);
    tokenEl.addEventListener('keydown', e => { if (e.key === 'Enter') load(); });
    if (tokenEl.value) load();
  </script>
</body>
</html>
