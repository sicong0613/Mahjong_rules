<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Beginner guide to mahjong tiles, calls, winning hands, and scoring">
  <base href="../">
  <title>Beginner Guide - Mahjong Scoring Reference</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { padding-top: 88px; padding-bottom: 40px; }
    #instr-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100; height: 48px;
      background: var(--accent); color: #fff; display: flex; align-items: center;
      gap: 12px; padding: 0 16px; box-shadow: 0 2px 6px rgba(0,0,0,.25);
    }
    #instr-header a.back-link {
      color: rgba(255,255,255,.9); text-decoration: none; font-size: .85rem;
      padding: 4px 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,.45);
      white-space: nowrap;
    }
    #instr-header .instr-title { font-weight: 700; font-size: .95rem; }
    #instr-toc {
      position: fixed; top: 48px; left: 0; right: 0; z-index: 90;
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 8px 14px; display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none;
    }
    #instr-toc::-webkit-scrollbar { display: none; }
    #instr-toc a {
      white-space: nowrap; font-size: .73rem; color: var(--text-muted);
      text-decoration: none; padding: 3px 10px; border-radius: 12px;
      border: 1px solid var(--border); flex-shrink: 0;
    }
    #instr-main { max-width: 860px; margin: 0 auto; padding: 24px 14px 0; }
    .instr-section { margin-bottom: 40px; }
    .instr-section h2 {
      font-size: 1.1rem; font-weight: 800; color: var(--accent);
      margin-bottom: 12px; padding-bottom: 6px; border-bottom: 2px solid var(--border);
      scroll-margin-top: 96px;
    }
    .instr-section h3 { font-size: .9rem; font-weight: 700; margin: 14px 0 6px; }
    .instr-section p, .instr-section ul, .instr-section ol {
      font-size: .855rem; line-height: 1.75; color: #3a3028; margin-bottom: 6px;
    }
    .tile-suites { display: flex; flex-wrap: wrap; gap: 14px 20px; margin: 12px 0; justify-content: center; }
    .tile-suite-group { display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .tile-suite-row, .hand-tiles, .concept-card-tiles, .common-hand-tiles { display: flex; flex-wrap: wrap; gap: 2px; align-items: center; }
    .tile-suite-label, .hand-label, .concept-card-note, .common-hand-desc { font-size: .75rem; color: var(--text-muted); }
    .tile-sm { width: 26px; height: 34px; padding: 1px; box-sizing: border-box; border-radius: 3px; object-fit: contain; display: block; flex-shrink: 0; box-shadow: 0 0 0 1px rgba(0,0,0,.55); }
    @media (max-width: 480px) { .tile-sm { width: 20px; height: 26px; } }   /* 移动端缩小，须与横放/叠放 wrap 的移动端尺寸匹配（与中文版一致） */
    .tile-sm[src$="X.svg"] { padding: 0; object-fit: fill; }   /* 牌背铺满，去掉白边（与中文版一致） */
    /* 横放 / 叠放的牌（副露示意），与中文版一致 */
    .tile-rotated-wrap { display: inline-flex; align-items: center; justify-content: center; width: 37px; height: 28px; flex-shrink: 0; }
    .tile-rotated-wrap .tile-sm { transform: rotate(90deg); }
    @media (max-width: 480px) { .tile-rotated-wrap { width: 26px; height: 20px; } }
    .tile-stacked-wrap { position: relative; display: inline-block; width: 37px; height: 44px; flex-shrink: 0; }
    .tile-stacked-wrap .tile-sm { position: absolute; left: 0; right: 0; margin: 0 auto; transform: rotate(90deg); }
    .tile-stacked-wrap .tile-sm:first-child { top: 13px; }
    .tile-stacked-wrap .tile-sm:last-child  { top: -15px; }
    @media (max-width: 480px) { .tile-stacked-wrap { width: 28px; height: 34px; } .tile-stacked-wrap .tile-sm:first-child { top: 11px; } .tile-stacked-wrap .tile-sm:last-child { top: -11px; } }
    .hand-example, .concept-card, .common-hand-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; margin: 8px 0; }
    .concept-grid, .common-hands-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 10px; margin-top: 12px; }
    .concept-card-label, .common-hand-name { font-weight: 700; color: var(--accent); }
    /* ── Common-hands stats (mirrors the Chinese guide) ── */
    .common-hand-card { transition: background .45s ease; }
    .common-hand-header { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    .common-hand-pct { margin-left: auto; font-size: .75rem; color: var(--text-muted); white-space: nowrap; }
    .yakuhai-names { font-weight: 700; font-size: .82rem; margin: 2px 0 5px; }
    .common-hands-grid:not(.show-minor) .common-hand-card.hc-minor { display: none; }
    .common-hands-toggle {
      margin-top: 10px; font-size: .8rem; color: var(--accent);
      background: none; border: 1px solid var(--border); border-radius: 6px;
      padding: 5px 12px; cursor: pointer;
    }
    .common-hands-toggle:hover { border-color: var(--accent); }
    /* Inline collapsibles embedded in paragraph text (excludes collapse/warning boxes) */
    .instr-section details:not(.collapse-box):not(.warning-box) { display: inline; }
    .instr-section details:not(.collapse-box):not(.warning-box) summary {
      display: inline; color: var(--accent); cursor: pointer; font-size: .85em; user-select: none;
    }
    .instr-section details:not(.collapse-box):not(.warning-box)[open] {
      display: block; background: var(--surface); border-radius: 6px; padding: 6px 10px; margin: 4px 0;
      box-shadow: 0 1px 4px rgba(0,0,0,.12), 0 0 0 1px var(--border);
    }
    .instr-section details:not(.collapse-box):not(.warning-box)[open] summary { display: block; margin-bottom: 4px; }
    /* Info / tip boxes */
    .info-box { background: #e3f2fd; border-left: 3px solid #1565c0; border-radius: 0 6px 6px 0; padding: 8px 12px; font-size: .82rem; color: #1a3a5c; margin: 10px 0; line-height: 1.65; }
    .tip-box { background: #fffbf0; border-left: 3px solid #f0c040; border-radius: 0 6px 6px 0; padding: 8px 12px; font-size: .82rem; color: #5a4a20; margin: 10px 0; line-height: 1.65; }
    /* Collapsible boxes */
    .collapse-box, .warning-box { border-radius: 0 6px 6px 0; margin: 10px 0; font-size: .82rem; line-height: 1.65; }
    .collapse-box { background: #fff1ab; border-left: 3px solid #ffd22f; color: #3e1a00; }
    .warning-box  { background: #ffebee; border-left: 3px solid #b71c1c; color: #5a1a1a; }
    .collapse-box summary, .warning-box summary {
      padding: 8px 12px; cursor: pointer; font-weight: 600; list-style: none;
      display: flex; align-items: center; gap: 6px; user-select: none;
    }
    .collapse-box summary::-webkit-details-marker,
    .warning-box  summary::-webkit-details-marker { display: none; }
    .collapse-box summary::before, .warning-box summary::before {
      content: '▶'; font-size: .65em; transition: transform .15s; flex-shrink: 0;
    }
    .collapse-box[open] summary::before, .warning-box[open] summary::before { transform: rotate(90deg); }
    .collapse-body { padding: 0 12px 8px; }
    .step-list { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 10px; }
    .step-list li { display: flex; gap: 10px; align-items: flex-start; }
    .step-num { flex-shrink: 0; width: 22px; height: 22px; background: var(--accent); color: #fff; border-radius: 50%; font-size: .7rem; font-weight: 700; display: flex; align-items: center; justify-content: center; margin-top: 2px; }
  </style>
</head>
<body>
  <header id="instr-header">
    <a href="en/" class="back-link">← Back to reference</a>
    <span class="instr-title">Beginner Guide</span>
  </header>

  <nav id="instr-toc"></nav>
  <main id="instr-main"></main>

  <footer id="site-footer">
    <p>Scoring engine based on <a href="https://github.com/summerinsects/mahjong-algorithm" target="_blank" rel="noopener">Jeff Wang's open-source library</a> (MIT License)</p>
    <p>Pattern data and UI organized by <a href="https://github.com/sicong0613/Mahjong_rules" target="_blank" rel="noopener">sicong0613</a> with Claude (Anthropic)</p>
  </footer>

  <script src="data/glossary_en.js?v=1"></script>
  <script src="data/fans.js?v=6"></script>
  <script src="data/fans_en.js?v=2"></script>
  <script src="data/instruction_en.js?v=3"></script>
  <script>
    // Hidden from the common-hands grid (matched by Chinese name, as /api/fan-stats reports it)
    const COMMON_HANDS_HIDE = new Set(['宝牌']);   // don't surface Dora
    const zhOf = f => f.nameZh || f.name;

    // Simplified card blurbs (matched by Chinese name, mirrors the Chinese guide;
    // the full description still lives in the reference table).
    const COMMON_HAND_DESC = {
      '立直': 'With a closed hand at tenpai, turn this discard sideways to declare riichi. See <a href="#s3" style="color:var(--accent);">3. Chii, Pon, Kong, Riichi</a> on this page.',
    };
    function applyCommonHandDesc(el, zhName, fallback) {
      const ov = COMMON_HAND_DESC[zhName];
      if (ov != null) el.innerHTML = ov;
      else el.textContent = fallback || '';
    }

    const TILE_LABELS = {
      '1m':'1 character','2m':'2 characters','3m':'3 characters','4m':'4 characters','5m':'5 characters','6m':'6 characters','7m':'7 characters','8m':'8 characters','9m':'9 characters',
      '1p':'1 dot','2p':'2 dots','3p':'3 dots','4p':'4 dots','5p':'5 dots','6p':'6 dots','7p':'7 dots','8p':'8 dots','9p':'9 dots',
      '1s':'1 bamboo','2s':'2 bamboo','3s':'3 bamboo','4s':'4 bamboo','5s':'5 bamboo','6s':'6 bamboo','7s':'7 bamboo','8s':'8 bamboo','9s':'9 bamboo',
      '0m':'red five characters','0p':'red five dots','0s':'red five bamboo','E':'East','S':'South','W':'West','N':'North','Z':'Red','F':'Green','B':'White','X':'Back',
    };
    function makeTile(code) {
      const img = document.createElement('img');
      img.className = 'tile-sm';
      img.src = `img/tiles/${code}.svg`;
      img.alt = TILE_LABELS[code] || code;
      return img;
    }
    // > prefix = tile turned sideways (open meld); two adjacent > tiles = stacked (added kan)
    function renderTileStr(tilesStr, container) {
      const tokens = tilesStr.trim().split(/\s+/);
      let i = 0;
      while (i < tokens.length) {
        const tok = tokens[i];
        if (tok === '|') {
          const sep = document.createElement('span'); sep.style.width = '8px';
          container.appendChild(sep); i++;
        } else if (tok.startsWith('>') && i + 1 < tokens.length && tokens[i + 1].startsWith('>')) {
          const wrap = document.createElement('span'); wrap.className = 'tile-stacked-wrap';
          wrap.appendChild(makeTile(tok.slice(1)));
          wrap.appendChild(makeTile(tokens[i + 1].slice(1)));
          container.appendChild(wrap); i += 2;
        } else if (tok.startsWith('>')) {
          const wrap = document.createElement('span'); wrap.className = 'tile-rotated-wrap';
          wrap.appendChild(makeTile(tok.slice(1)));
          container.appendChild(wrap); i++;
        } else {
          container.appendChild(makeTile(tok)); i++;
        }
      }
    }
    function renderBlock(block) {
      if (block.type === 'p') { const el = document.createElement('p'); el.innerHTML = block.text; return el; }
      if (block.type === 'info' || block.type === 'tip') {
        const el = document.createElement('div'); el.className = `${block.type}-box`; el.innerHTML = block.text; return el;
      }
      if (block.type === 'collapse' || block.type === 'warning') {
        const details = document.createElement('details'); details.className = `${block.type}-box`;
        if (block.type === 'warning') details.setAttribute('open', '');
        const summary = document.createElement('summary');
        summary.textContent = block.title || (block.type === 'warning' ? 'Notice' : 'Details');
        const body = document.createElement('div'); body.className = 'collapse-body'; body.innerHTML = block.text;
        details.append(summary, body);
        return details;
      }
      if (block.type === 'h3') { const el = document.createElement('h3'); el.textContent = block.text; return el; }
      if (block.type === 'ul') {
        const el = document.createElement('ul');
        block.items.forEach(item => { const li = document.createElement('li'); li.innerHTML = item; el.appendChild(li); });
        return el;
      }
      if (block.type === 'steps') {
        const el = document.createElement('ol'); el.className = 'step-list';
        block.items.forEach((item, i) => {
          const li = document.createElement('li');
          li.innerHTML = `<div class="step-num">${i + 1}</div><div>${item}</div>`;
          el.appendChild(li);
        });
        return el;
      }
      if (block.type === 'tile-suites') {
        const wrap = document.createElement('div'); wrap.className = 'tile-suites';
        block.groups.forEach(g => {
          if (g.break) { const br = document.createElement('div'); br.style.cssText = 'width:100%;height:0'; wrap.appendChild(br); return; }
          const group = document.createElement('div'); group.className = 'tile-suite-group';
          const row = document.createElement('div'); row.className = 'tile-suite-row'; renderTileStr(g.tiles, row);
          const label = document.createElement('div'); label.className = 'tile-suite-label'; label.textContent = g.label;
          group.append(row, label); wrap.appendChild(group);
        });
        return wrap;
      }
      if (block.type === 'hand') {
        const box = document.createElement('div'); box.className = 'hand-example';
        box.innerHTML = `<div class="hand-label">${block.label}</div>`;
        const row = document.createElement('div'); row.className = 'hand-tiles'; renderTileStr(block.tiles, row);
        box.appendChild(row); return box;
      }
      if (block.type === 'concept-grid') {
        const grid = document.createElement('div'); grid.className = 'concept-grid';
        block.items.forEach(item => {
          const card = document.createElement('div'); card.className = 'concept-card';
          card.innerHTML = `<div class="concept-card-label">${item.label}</div>`;
          const row = document.createElement('div'); row.className = 'concept-card-tiles'; renderTileStr(item.tiles, row);
          const note = document.createElement('div'); note.className = 'concept-card-note'; note.textContent = item.note;
          card.append(row, note); grid.appendChild(card);
        });
        return grid;
      }
      if (block.type === 'common-hands') {
        const grid = document.createElement('div'); grid.className = 'common-hands-grid';
        block.items.forEach(item => {
          // Value Honors: merge several fans into one card (special grouping, only here)
          if (item.ids) {
            const subs = item.ids.map(id => FANS_DATA.find(x => x.id === id)).filter(Boolean);
            if (subs.length === 0) return;
            const card = document.createElement('div'); card.className = 'common-hand-card';
            card.dataset.fanGroup = subs.map(zhOf).join(',');   // stats keyed by Chinese name
            card.dataset.fanTier  = subs[0].fan;
            const header = document.createElement('div'); header.className = 'common-hand-header';
            const badge = document.createElement('span'); badge.className = `fan-badge badge-${subs[0].fan}`; badge.textContent = subs[0].fan;
            const name = document.createElement('span'); name.className = 'common-hand-name'; name.textContent = item.groupName;
            const pct = document.createElement('span'); pct.className = 'common-hand-pct';
            header.append(badge, name, pct); card.appendChild(header);
            const names = document.createElement('div'); names.className = 'yakuhai-names';
            names.textContent = subs.map(s => s.name).join(' / ');
            card.appendChild(names);
            const desc = document.createElement('div'); desc.className = 'common-hand-desc';
            desc.textContent = 'Worth 2 fan immediately once melded; see the reference table.';
            card.appendChild(desc);
            grid.appendChild(card);
            return;
          }
          const f = FANS_DATA.find(x => x.id === item.id);
          if (!f) return;
          if (f.fan === 1) return;                      // 1-fan patterns not shown (still recorded)
          if (COMMON_HANDS_HIDE.has(zhOf(f))) return;
          const card = document.createElement('div'); card.className = 'common-hand-card';
          card.dataset.fanName = zhOf(f);               // stats keyed by Chinese name
          card.dataset.fanTier = f.fan;
          const header = document.createElement('div'); header.className = 'common-hand-header';
          const badge = document.createElement('span'); badge.className = `fan-badge badge-${f.fan}`; badge.textContent = f.fan;
          const name = document.createElement('span'); name.className = 'common-hand-name'; name.textContent = f.name;
          const pct = document.createElement('span'); pct.className = 'common-hand-pct';
          header.append(badge, name, pct); card.appendChild(header);
          const desc = document.createElement('div'); desc.className = 'common-hand-desc'; applyCommonHandDesc(desc, zhOf(f), f.desc);
          card.appendChild(desc);
          if (f.example) { const row = document.createElement('div'); row.className = 'common-hand-tiles'; renderTileStr(f.example, row); card.appendChild(row); }
          grid.appendChild(card);
        });
        return grid;
      }
      return null;
    }
    const toc = document.getElementById('instr-toc');
    const main = document.getElementById('instr-main');
    INSTRUCTION_DATA.forEach(sec => {
      const a = document.createElement('a'); a.href = `#${sec.id}`; a.textContent = sec.title; toc.appendChild(a);
      const section = document.createElement('section'); section.className = 'instr-section'; section.id = sec.id;
      const h2 = document.createElement('h2'); h2.textContent = sec.title; section.appendChild(h2);
      sec.blocks.forEach(block => { const el = renderBlock(block); if (el) section.appendChild(el); });
      main.appendChild(section);
    });

    // ── Term highlighting: wrap glossary terms and fan names in clickable .term
    //    spans that pop up a definition (mirrors the Chinese guide; CSS in style.css) ──
    let _termMap = null, _termPattern = null, _activeTerm = null;
    function getTermMap() {
      if (_termMap) return _termMap;
      _termMap = new Map();
      if (typeof GLOSSARY !== 'undefined')
        for (const [term, def] of Object.entries(GLOSSARY)) _termMap.set(term, { type: 'gloss', def });
      FANS_DATA.forEach(f => {
        _termMap.set(f.name, { type: 'fan', data: f });
        (f.nameAlt || []).forEach(alt => _termMap.set(alt, { type: 'fan', data: f }));
      });
      return _termMap;
    }
    function getTermPattern() {
      if (_termPattern) return _termPattern;
      const terms = [...getTermMap().keys()].filter(Boolean).sort((a, b) => b.length - a.length);
      const body = terms.map(t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|');
      // Letter-boundary lookarounds: short terms (Meld, Pon, Discard…) must not match mid-word
      _termPattern = new RegExp('(?<![A-Za-z])(?:' + body + ')(?![A-Za-z])', 'g');
      return _termPattern;
    }
    function linkifyText(rootEl) {
      const pattern = getTermPattern();
      const walker = document.createTreeWalker(rootEl, NodeFilter.SHOW_TEXT, {
        acceptNode(node) {
          if (!node.textContent.trim()) return NodeFilter.FILTER_REJECT;
          if (node.parentElement?.closest('.tile-suite-row,.hand-tiles,.concept-card-tiles,.common-hand-tiles,.term,.fan-badge,.instr-title'))
            return NodeFilter.FILTER_REJECT;
          return NodeFilter.FILTER_ACCEPT;
        }
      });
      const nodes = []; let n;
      while ((n = walker.nextNode())) nodes.push(n);
      nodes.forEach(textNode => {
        const text = textNode.textContent;
        pattern.lastIndex = 0;
        let match, last = 0;
        const frag = document.createDocumentFragment();
        while ((match = pattern.exec(text)) !== null) {
          if (match.index > last) frag.appendChild(document.createTextNode(text.slice(last, match.index)));
          const span = document.createElement('span');
          span.className = 'term'; span.dataset.term = match[0]; span.textContent = match[0];
          frag.appendChild(span);
          last = match.index + match[0].length;
        }
        if (last === 0) return;
        if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
        textNode.parentNode.replaceChild(frag, textNode);
      });
    }
    function showTermPopup(termEl, termName) {
      let popup = document.getElementById('term-popup');
      if (!popup) { popup = document.createElement('div'); popup.id = 'term-popup'; popup.className = 'hidden'; document.body.appendChild(popup); }
      const entry = getTermMap().get(termName);
      if (!entry) return;
      if (entry.type === 'fan') {
        const f = entry.data;
        popup.innerHTML = `
          <div class="term-popup-head">
            <span class="fan-badge badge-${f.fan} term-popup-badge">${f.fan}</span>
            <strong class="term-popup-name">${f.name}</strong>
          </div>
          <p class="term-popup-desc">${f.desc}</p>
          <a class="term-popup-goto" href="en/index.html#${f.id}" target="_blank">→ View reference table</a>`;
      } else {
        popup.innerHTML = `
          <div class="term-popup-head"><strong class="term-popup-name">${termName}</strong></div>
          <p class="term-popup-desc">${entry.def}</p>`;
      }
      popup.classList.remove('hidden');
      const rect = termEl.getBoundingClientRect();
      const W = 250, M = 8;
      let left = rect.left + window.scrollX;
      if (left + W > window.innerWidth - M) left = window.innerWidth - W - M;
      if (left < M) left = M;
      popup.style.left = left + 'px';
      popup.style.top  = (rect.bottom + window.scrollY + 6) + 'px';
    }
    function hideTermPopup() { _activeTerm = null; document.getElementById('term-popup')?.classList.add('hidden'); }
    document.addEventListener('click', e => {
      const term = e.target.closest('.term');
      if (term) {
        if (term === _activeTerm) { hideTermPopup(); return; }
        _activeTerm = term; showTermPopup(term, term.dataset.term); return;
      }
      if (!e.target.closest('#term-popup')) hideTermPopup();
    });
    linkifyText(main);

    // <base href="../"> makes "#s3"-style links resolve against the site root, which would
    // send in-page section links to the Chinese homepage. Intercept clicks on anchors whose
    // hash targets a section on THIS page and scroll there instead.
    document.addEventListener('click', e => {
      const a = e.target.closest('a[href]');
      if (!a || !a.hash) return;
      const target = document.getElementById(a.hash.slice(1));
      if (!target) return;   // hash not on this page (e.g. reference-table link) → let it navigate
      e.preventDefault();
      const y = target.getBoundingClientRect().top + window.scrollY - 96;
      window.scrollTo({ top: y, behavior: 'smooth' });
      history.replaceState(null, '', location.pathname + a.hash);
    });

    // #rrggbb → rgba(...), for the %-bar card background
    function hexToRgba(hex, alpha) {
      const m = /^#?([0-9a-f]{6})$/i.exec(hex || '');
      if (!m) return '';
      const n = parseInt(m[1], 16);
      return `rgba(${(n >> 16) & 255}, ${(n >> 8) & 255}, ${n & 255}, ${alpha})`;
    }

    // ── Fetch stats from the Cloudflare Worker: supplement uploaded fans,
    //    keep only reported ones, reorder by frequency, show percentages ──
    //    Note: /api/fan-stats reports Chinese fan names, so all matching is by nameZh.
    fetch('/api/fan-stats')
      .then(r => r.ok ? r.json() : null)
      .then(data => {
        if (!data) return;   // API unavailable: keep the static grid as-is
        const fans  = Array.isArray(data) ? data : (data.fans  || []);
        const total = Array.isArray(data) ? 0     : (data.total || 0);
        const freq  = Object.fromEntries(fans.map(d => [d.name, d.count]));

        const grid = document.querySelector('.common-hands-grid');
        if (!grid) return;

        const cardCount = card => card.dataset.fanGroup
          ? card.dataset.fanGroup.split(',').reduce((s, n) => s + (freq[n] || 0), 0)
          : (freq[card.dataset.fanName] || 0);

        const existing = new Set();
        grid.querySelectorAll('.common-hand-card').forEach(c => {
          if (c.dataset.fanGroup) c.dataset.fanGroup.split(',').forEach(n => existing.add(n));
          else if (c.dataset.fanName) existing.add(c.dataset.fanName);
        });
        // Supplement fans that were uploaded but aren't in the static grid
        fans.forEach(({ name, count }) => {          // name is Chinese (from API)
          if (!count || existing.has(name)) return;
          const f = FANS_DATA.find(x => zhOf(x) === name);
          if (f && f.fan === 1) return;
          if (COMMON_HANDS_HIDE.has(name)) return;
          const card = document.createElement('div');
          card.className = 'common-hand-card';
          card.dataset.fanName = name;               // Chinese, for freq matching
          const header = document.createElement('div'); header.className = 'common-hand-header';
          const badge = document.createElement('span');
          badge.className = f ? `fan-badge badge-${f.fan}` : 'fan-badge';
          badge.textContent = f ? f.fan : '?';
          const nameEl = document.createElement('span'); nameEl.className = 'common-hand-name';
          nameEl.textContent = f ? f.name : name;    // English label when known
          const pct = document.createElement('span'); pct.className = 'common-hand-pct';
          header.append(badge, nameEl, pct); card.appendChild(header);
          if (f) card.dataset.fanTier = f.fan;
          const desc = document.createElement('div'); desc.className = 'common-hand-desc'; applyCommonHandDesc(desc, name, f?.desc ?? '');
          card.appendChild(desc);
          const tileStr = f?.example ?? '';
          if (tileStr) { const tiles = document.createElement('div'); tiles.className = 'common-hand-tiles'; renderTileStr(tileStr, tiles); card.appendChild(tiles); }
          grid.appendChild(card);
        });

        // Keep only cards with reported data; drop 1-fan patterns and hidden ones
        let shown = 0;
        grid.querySelectorAll('.common-hand-card').forEach(card => {
          const has = cardCount(card) > 0 && card.dataset.fanTier !== '1'
                      && !COMMON_HANDS_HIDE.has(card.dataset.fanName);
          card.hidden = !has;
          if (has) shown++;
        });

        // Reorder: frequency desc → fan asc → name
        const tierOf = c => Number(c.dataset.fanTier) || 0;
        const nameOf = c => c.querySelector('.common-hand-name')?.textContent || '';
        [...grid.children]
          .sort((a, b) =>
            (cardCount(b) - cardCount(a)) ||
            (tierOf(a) - tierOf(b)) ||
            nameOf(a).localeCompare(nameOf(b), 'en'))
          .forEach(c => grid.appendChild(c));

        // Fill percentages + turn each card background into a %-bar; collapse ≤2%
        const rootStyle = getComputedStyle(document.documentElement);
        let minorCount = 0;
        grid.querySelectorAll('.common-hand-card').forEach(card => {
          const pct = total > 0 ? Math.min(cardCount(card) / total * 100, 100) : 0;
          const pctEl = card.querySelector('.common-hand-pct');
          if (pctEl) pctEl.textContent = pct ? pct.toFixed(1) + '%' : '';
          const tier = card.dataset.fanTier;
          const rgba = hexToRgba(tier != null ? rootStyle.getPropertyValue('--c' + tier).trim() : '', 0.22)
                       || 'rgba(120,120,120,0.15)';
          const w = pct.toFixed(2);
          card.style.background =
            `linear-gradient(to right, ${rgba} 0 ${w}%, transparent ${w}% 100%), var(--surface)`;
          const minor = !card.hidden && pct <= 2;
          card.classList.toggle('hc-minor', minor);
          if (minor) minorCount++;
        });

        // Expand/collapse ≤2% patterns
        function refreshToggle() {
          const t = document.getElementById('common-hands-toggle');
          if (!t) return;
          t.textContent = grid.classList.contains('show-minor')
            ? 'Hide patterns ≤2%'
            : 'Show more (≤2%)';
        }
        let toggle = document.getElementById('common-hands-toggle');
        if (minorCount > 0) {
          if (!toggle) {
            toggle = document.createElement('button');
            toggle.id = 'common-hands-toggle';
            toggle.className = 'common-hands-toggle';
            toggle.addEventListener('click', () => { grid.classList.toggle('show-minor'); refreshToggle(); });
            grid.parentNode.insertBefore(toggle, grid.nextSibling);
          }
          toggle.hidden = false;
          refreshToggle();
        } else if (toggle) {
          toggle.hidden = true;
        }

        // Empty note when nothing has been uploaded
        let note = document.getElementById('common-hands-empty');
        if (shown === 0) {
          if (!note) {
            note = document.createElement('p');
            note.id = 'common-hands-empty';
            note.style.cssText = 'color: var(--text-muted); margin-top: 12px;';
            note.textContent = 'No uploaded data yet — upload your winning hands from the calculator.';
            grid.parentNode.insertBefore(note, grid.nextSibling);
          }
          note.hidden = false;
        } else if (note) {
          note.hidden = true;
        }
      })
      .catch(() => {});
  </script>
</body>
</html>
