<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="国标麻将（含村规）番种速查与计番工具">
  <title>麻将番种速查</title>
  <link rel="stylesheet" href="style.css?v=12">
</head>
<body>

  <header id="site-header">
    <div class="header-inner">
      <h1>麻将番种速查</h1>
      <input type="search" id="search-input" placeholder="搜索番种…" autocomplete="off" spellcheck="false">
      <a href="instruction.html" class="btn-outline" title="入门指南">入门</a>
      <button id="hand-calc-btn" class="btn-outline" title="手牌计番">计番</button>
    </div>
  </header>

  <div id="filter-bar">
    <div class="filter-row" id="fan-filter-row">
      <span class="filter-label">番数</span>
      <div class="chip-group" id="fan-chips"></div>
    </div>
    <div class="filter-row" id="tag-filter-row">
      <span class="filter-label">标签</span>
      <div class="chip-group" id="tag-chips"></div>
    </div>
    <div class="filter-row filter-actions">
      <button id="dlc-toggle" class="btn-outline btn-sm">显示 DLC</button>
      <button id="lang-toggle" class="btn-outline btn-sm">Eng</button>
      <button id="clear-filters" class="btn-ghost btn-sm">清除筛选</button>
    </div>
  </div>

  <div id="results-summary"></div>

  <main id="fan-list"></main>

  <div id="calc-bar" class="hidden">
    <div class="calc-bar-inner">
      <span>已选 <strong id="calc-count">0</strong> 种</span>
      <span class="calc-sep">｜</span>
      <span>合计 <strong id="calc-total">0</strong> 番</span>
      <button id="calc-clear" class="btn-ghost btn-sm">清除</button>
      <button id="calc-close" class="btn-outline btn-sm">退出</button>
    </div>
  </div>

  <!-- 手牌计番页面 -->
  <div id="hand-calc-page" class="hc-page hidden">
    <div class="hc-topbar">
      <button id="hc-back" class="hc-btn-ghost" data-i18n="← 返回">← 返回</button>
      <span class="hc-title" data-i18n="手牌计番">手牌计番</span>
      <button id="hc-clear-all" class="hc-btn-ghost" data-i18n="清空">清空</button>
    </div>

    <div class="hc-content">
      <div class="hc-section">
        <div class="hc-section-label"><span data-i18n="立牌">立牌</span> <span id="hc-standing-count">0/13</span></div>
        <div id="hc-standing-area" class="hc-tile-row"></div>
      </div>

      <div class="hc-section hc-win-row">
        <div class="hc-section-label"><span data-i18n="和牌张">和牌张</span></div>
        <div id="hc-win-area" class="hc-tile-row"></div>
        <div class="hc-select-tools">
          <label class="hc-check"><input type="checkbox" id="hc-select-check"> <span data-i18n="选牌">选牌</span></label>
          <button id="hc-set-meld" class="hc-btn-xs" disabled title="选中的3~4张组成刻子/顺子/杠">设为副露</button>
          <button id="hc-set-win"  class="hc-btn-xs" disabled title="把选中的单张设为和牌张">和牌张</button>
          <button id="hc-del-sel"  class="hc-btn-xs hc-btn-danger" disabled title="删除选中的牌（不放回手牌）">删除</button>
        </div>
      </div>

      <div class="hc-section">
        <div class="hc-section-label" data-i18n="副露">副露</div>
        <div id="hc-meld-area" class="hc-meld-row"></div>
      </div>

      <div class="hc-section hidden" id="hc-buffer-section">
        <div class="hc-section-label"><span id="hc-buffer-label">组合中 (0/3)</span> <button id="hc-buffer-clear" class="hc-btn-ghost hc-btn-xs" data-i18n="取消">取消</button></div>
        <div id="hc-buffer-area" class="hc-tile-row"></div>
      </div>

      <div class="hc-section hc-settings">
        <label class="hc-check"><input type="checkbox" id="hc-self-drawn"> <span data-i18n="自摸">自摸</span></label>
        <label class="hc-check"><input type="checkbox" id="hc-dealer-win"> <span data-i18n="庄赢">庄赢</span></label>
        <label class="hc-check"><input type="checkbox" id="hc-last-tile"> <span data-i18n="和绝张">和绝张</span></label>
        <label class="hc-check"><input type="checkbox" id="hc-kong-win"> <span data-i18n="杠上开花">杠上开花</span></label>
        <label class="hc-check"><input type="checkbox" id="hc-gang-kai-chong"> <span data-i18n="杠上开铳">杠上开铳</span></label>
        <label class="hc-check"><input type="checkbox" id="hc-qiang-gang"> <span data-i18n="抢杠">抢杠</span></label>
        <label class="hc-check"><input type="checkbox" id="hc-wall-last"> <span data-i18n="海底捞月">海底捞月</span></label>
        <label class="hc-check"><input type="checkbox" id="hc-river-last"> <span data-i18n="河底捞鱼">河底捞鱼</span></label>
        <label class="hc-check"><input type="checkbox" id="hc-fan-tian_he"> <span data-i18n="天和">天和</span></label>
        <label class="hc-check"><input type="checkbox" id="hc-fan-di_he"> <span data-i18n="地和">地和</span></label>
        <label class="hc-check"><input type="checkbox" id="hc-fan-ren_he"> <span data-i18n="人和">人和</span></label>
        <label class="hc-check"><input type="checkbox" id="hc-liuju-manguan"> <span data-i18n="流局满贯">流局满贯</span></label>
      </div>

      <div class="hc-section hc-winds">
        <label><span data-i18n="圈风">圈风</span> <select id="hc-prevalent"><option value="" selected data-i18n="—">—</option><option value="0" data-i18n="东">东</option><option value="1" data-i18n="南">南</option><option value="2" data-i18n="西">西</option><option value="3" data-i18n="北">北</option></select></label>
        <label><span data-i18n="门风">门风</span> <select id="hc-seat"><option value="" selected data-i18n="—">—</option><option value="0" data-i18n="东">东</option><option value="1" data-i18n="南">南</option><option value="2" data-i18n="西">西</option><option value="3" data-i18n="北">北</option></select></label>
        <label><span data-i18n="花牌">花牌</span> <input type="number" id="hc-flowers" min="0" max="8" value="0"></label>
      </div>

      <div class="hc-section hc-dora-row">
        <label class="hc-check">
          <input type="checkbox" id="hc-dora">
          <span data-i18n="宝牌">宝牌</span>
          <select id="hc-dora-count" disabled>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
          </select>
          <span data-i18n="张">张</span>
        </label>
      </div>

      <div class="hc-section hc-riichi-row">
        <label class="hc-check">
          <input type="checkbox" id="hc-riichi">
          <select id="hc-riichi-type" disabled>
            <option value="riichi" data-i18n="立直">立直</option>
            <option value="double_riichi" data-i18n="二立直">二立直</option>
            <option value="open_riichi" data-i18n="明牌立直">明牌立直</option>
          </select>
        </label>
        <label class="hc-check">
          <input type="checkbox" id="hc-ippatsu" disabled>
          <span data-i18n="一发">一发</span>
        </label>
      </div>

      <div class="hc-section hc-calc-row">
        <button id="hc-calc-btn" class="hc-calc-btn" disabled data-i18n="计 算">计 算</button>
        <button id="hc-upload-btn" class="hc-upload-btn" disabled title="计算并上传番型数据">上传</button>
        <button id="hc-recognize-btn" class="hc-recog-btn" title="拍照识别，自动填入立牌/副露/和牌张">📷</button>
        <button id="hc-kb-toggle" class="hc-kb-btn" title="收起键盘">⌨</button>
      </div>

      <div id="hc-result" class="hc-result hidden"></div>
    </div>

    <div class="hc-bottom">
      <div class="hc-mode-row">
        <button class="hc-mode-btn active" data-mode="standing" data-i18n="立牌">立牌</button>
        <button class="hc-mode-btn" data-mode="meld" data-i18n="吃/碰">吃/碰</button>
        <button class="hc-mode-btn" data-mode="minggang" data-i18n="明杠">明杠</button>
        <button class="hc-mode-btn" data-mode="angang" data-i18n="暗杠">暗杠</button>
      </div>
      <div id="hc-picker" class="hc-picker"></div>
    </div>

    <!-- 拍照识别浮层 -->
    <div id="hc-recog-modal" class="hc-recog-overlay hidden">
      <div class="hc-recog-box">
        <div class="hc-recog-head">
          <strong>拍照识别</strong>
          <button id="hc-recog-close" class="hc-btn-ghost">✕</button>
        </div>
        <div class="hc-recog-bar">
          <input id="hc-recog-file" type="file" accept="image/*">
          <input id="hc-recog-camera" type="file" accept="image/*" capture="environment" hidden>
          <button id="hc-recog-camera-btn" class="hc-recog-mini" title="调用相机直接拍照">📷 拍照</button>
          <button id="hc-recog-roi" class="hc-recog-mini" hidden>框选手牌区域</button>
          <button id="hc-recog-clear" class="hc-recog-mini" hidden>清除框选</button>
        </div>
        <p class="hc-recog-hint">上传<strong>完整照片</strong>后，点「框选手牌区域」拖一个矩形框住你的手牌，只保留框内的牌。
          把被吃/碰/杠的牌（含和牌张）<strong>转向摆放</strong>，可自动识别为副露/和牌张——转向的牌若能与相邻牌组成刻子/顺子/杠，即归为副露；否则作为候选和牌张，全场恰好一个候选时自动锁定。</p>
        <div id="hc-recog-msg" class="hc-recog-msg"></div>
        <canvas id="hc-recog-canvas" hidden></canvas>
        <div id="hc-recog-summary" class="hc-recog-summary"></div>
        <div id="hc-recog-tiles" class="hc-recog-tiles"></div>
        <div class="hc-recog-actions">
          <button id="hc-recog-set-meld" class="hc-recog-action-btn" disabled>设为副露</button>
          <button id="hc-recog-set-win"  class="hc-recog-action-btn" disabled>和牌张</button>
          <button id="hc-recog-del"      class="hc-recog-action-btn hc-btn-danger" disabled>删除</button>
          <button id="hc-recog-fill" class="hc-calc-btn" disabled>接受并填入</button>
        </div>
      </div>
    </div>
  </div>

  <footer id="site-footer">
    <p>计番引擎基于 <a href="https://github.com/summerinsects/mahjong-algorithm" target="_blank" rel="noopener">Jeff Wang 的开源库</a>（MIT License）</p>
    <p>番种数据与 UI 由 <a href="https://github.com/sicong0613/Mahjong_rules" target="_blank" rel="noopener">sicong0613</a> 整理 &amp; 与 Claude（Anthropic）协作开发</p>
  </footer>

  <script src="data/glossary.js?v=3"></script>
  <script src="data/fans.js?v=6"></script>
  <script src="data/wasm_name_map.js?v=3"></script>
  <script src="data/fan_calculator.js?v=3"></script>
  <script src="calculator.js?v=3"></script>
  <script src="calc-ui.js?v=21"></script>
  <script src="script.js?v=4"></script>
</body>
</html>
